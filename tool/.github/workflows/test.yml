name: Test Suite

on:
  push:
    branches: [main, master, "feat/**"]
  pull_request:

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:unit

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: presales_test
          POSTGRES_PASSWORD: presales_test
          POSTGRES_DB: presales_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://presales_test:presales_test@localhost:5432/presales_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: npm run test:integration

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: presales_test
          POSTGRES_PASSWORD: presales_test
          POSTGRES_DB: presales_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx prisma generate
      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql://presales_test:presales_test@localhost:5432/presales_test
          E2E_DATABASE_URL: postgresql://presales_test:presales_test@localhost:5432/presales_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
          CI: "true"
        run: npm run test:e2e
